name: Desktop Release

# Build MONOLYTHIUM — THE ANCHORFALL desktop installers (Electron) for
# macOS / Windows / Linux. On a version tag (vX.Y.Z) it signs + publishes to a
# GitHub Release; on manual dispatch it uploads unsigned artifacts for testing.
#
# Signing is automatic IF the secrets exist (reusing the monolythium convention):
#   macOS:   APPLE_CERTIFICATE_BASE64, APPLE_CERTIFICATE_PASSWORD, APPLE_TEAM_ID,
#            APPSTORE_CONNECT_KEY_BASE64, APPSTORE_CONNECT_KEY_ID, APPSTORE_CONNECT_ISSUER_ID
#   Windows: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_CERT_PROFILE
#            (+ optional vars AZURE_TRUSTED_SIGNING_ENDPOINT / _ACCOUNT_NAME)
# If a platform's secrets are absent, that platform builds UNSIGNED (still runs).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # one Apple-Silicon runner builds BOTH mac arches (arm64 natively, x64
          # cross-built) — GitHub no longer offers reliable Intel (macos-13)
          # runners, so we don't depend on them.
          - { os: macos-14,       plat: mac,   arch: both }
          - { os: windows-latest, plat: win,   arch: x64 }
          - { os: ubuntu-latest,  plat: linux, arch: x64 }
    runs-on: ${{ matrix.os }}
    env:
      IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
      HAS_AZURE: ${{ secrets.AZURE_CLIENT_ID != '' }}
      HAS_APPLE: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # devDeps (esbuild/typescript) are needed to transpile the TS game sources.
      - name: Install game deps
        working-directory: .
        run: npm install --no-audit --no-fund

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      # Transpile the game .ts -> sibling .js (server.js, public/*.js, shared/*.js)
      # BEFORE electron-builder bundles them into Resources/game. Without this the
      # AppImage would ship raw .ts the Electron renderer can't run.
      - name: Build the TS game
        working-directory: .
        run: npm run build

      # Bundle this runner's Node binary (correct OS + arch) into runtime/ so the
      # SDL controller sidecar has a real Node to run under inside the app.
      # (macOS does this per-arch inside its build step.)
      - name: Stage bundled Node runtime
        if: matrix.plat != 'mac'
        working-directory: desktop
        run: node scripts/prepare-runtime.js

      # @kmamal/sdl ships its SDL shared lib as a SONAME symlink
      # (libSDL2-2.0.so.0 -> .so). electron-builder's packer fails to recreate it
      # (ensureSymlink ENOENT), so replace it with a real copy. (macOS does this
      # per-arch inside its build step.)
      - name: De-symlink SDL shared libs
        if: matrix.plat == 'linux'
        working-directory: desktop
        shell: bash
        run: |
          d=node_modules/@kmamal/sdl/dist
          find "$d" -maxdepth 1 -name 'libSDL2*.so*' -type l | while read -r l; do
            real=$(readlink -f "$l")
            if [ -f "$real" ]; then rm "$l"; cp "$real" "$l"; echo "de-symlinked $(basename "$l")"; fi
          done
          ls -la "$d"

      # ---------------- macOS (arm64 + x64 on one Apple-Silicon runner) ----------
      - name: Build macOS
        if: matrix.plat == 'mac'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          ASC_KEY_B64: ${{ secrets.APPSTORE_CONNECT_KEY_BASE64 }}
          NODE_RUNTIME_VERSION: v20.18.1   # bundled-sidecar Node, per-arch download
        run: |
          PUB=$([ "$IS_TAG" = "true" ] && echo always || echo never)
          HOST=$(node -p process.arch)
          if [ -n "$CSC_LINK" ]; then
            echo "$ASC_KEY_B64" | base64 --decode > "$RUNNER_TEMP/asc.p8"
            export APPLE_API_KEY="$RUNNER_TEMP/asc.p8"
          fi
          for ARCH in arm64 x64; do
            echo "::group::prep macOS $ARCH"
            # SDL prebuild for this arch — CROSS_COMPILE_ARCH controls both the
            # sdl.node addon and the libSDL2 dylib that @kmamal/sdl downloads.
            rm -rf node_modules/@kmamal/sdl
            CROSS_COMPILE_ARCH=$ARCH npm install --no-audit --no-fund
            # bundled Node for this arch (copy host's, or download the other arch)
            mkdir -p runtime
            if [ "$ARCH" = "$HOST" ]; then
              node scripts/prepare-runtime.js
            else
              NV=$NODE_RUNTIME_VERSION
              curl -fsSL "https://nodejs.org/dist/$NV/node-$NV-darwin-$ARCH.tar.gz" | tar -xz -C "$RUNNER_TEMP"
              cp "$RUNNER_TEMP/node-$NV-darwin-$ARCH/bin/node" runtime/node && chmod +x runtime/node
              echo "staged downloaded darwin-$ARCH node"
            fi
            # de-symlink the SDL dylib (electron-builder can't pack symlinks)
            d=node_modules/@kmamal/sdl/dist
            find "$d" -maxdepth 1 -name 'libSDL2*.dylib' -type l | while read -r l; do
              real=$(readlink -f "$l"); [ -f "$real" ] && { rm "$l"; cp "$real" "$l"; }
            done
            echo "::endgroup::"
            echo "::group::build macOS $ARCH"
            if [ -n "$CSC_LINK" ]; then
              npx electron-builder --mac --$ARCH --publish "$PUB"
            else
              echo "::warning::No Apple cert secret — building UNSIGNED macOS $ARCH"
              npx electron-builder --mac --$ARCH \
                -c.mac.notarize=false -c.mac.identity=null --publish "$PUB"
            fi
            echo "::endgroup::"
          done

      # ---------------- Windows ----------------
      - name: Build Windows (unsigned)
        if: matrix.plat == 'win'
        working-directory: desktop
        run: npx electron-builder --win --publish never

      - name: Sign Windows (Azure Trusted Signing)
        if: matrix.plat == 'win' && env.HAS_AZURE == 'true'
        # NOTE: this action was renamed from azure/trusted-signing-action.
        # GitHub resolves every referenced action at job-setup time (even
        # if:-gated ones), so a stale path fails ALL jobs before they start.
        uses: Azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || 'https://eus.codesigning.azure.net/' }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || 'mono-labs' }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/desktop/dist
          files-folder-filter: exe
          files-folder-recurse: true

      - name: Publish Windows to release
        if: matrix.plat == 'win' && env.IS_TAG == 'true'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # the mac/linux jobs create the release via --publish; create it here
          # too if this job wins the race, then upload the signed installer.
          gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" \
                 --title "${{ github.ref_name }}" --notes "Automated desktop release"
          gh release upload "${{ github.ref_name }}" dist/*.exe --clobber --repo "$GITHUB_REPOSITORY"

      # ---------------- Linux ----------------
      - name: Build Linux
        if: matrix.plat == 'linux'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUB=$([ "$IS_TAG" = "true" ] && echo always || echo never)
          npx electron-builder --linux --publish "$PUB"

      # ---------------- manual (non-tag) artifacts ----------------
      - name: Upload build artifacts
        if: env.IS_TAG != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: anchorfall-${{ matrix.plat }}-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
          if-no-files-found: warn
