appId: xyz.monoplay.anchorfall
productName: MONOLYTHIUM Anchorfall
copyright: © Monoplay / Monolythium

# asar OFF: the SDL controller sidecar runs under a bundled *real* Node (not
# Electron — @kmamal/sdl SIGSEGVs inside Electron's binary). That Node cannot
# read files inside an asar archive, and @kmamal/sdl ships a native sdl.node +
# libSDL2 .dylib that dlopen can't load from inside asar either. With asar off
# they're all real files on disk the sidecar can require.
asar: false

# Do NOT rebuild native modules against Electron's ABI: @kmamal/sdl is loaded by
# the bundled-Node sidecar, so it must keep its npm (Node ABI) prebuild.
npmRebuild: false

directories:
  buildResources: build
  output: dist

# Files of the Electron shell itself.
files:
  - main.js
  - preload.js
  - controller-sidecar.js
  - assets/**
  - node_modules/**
  - package.json

# The web game (server.js + public/shared/levels + its node_modules) is copied
# into Resources/game; main.js points GAME_DIR there when packaged.
extraResources:
  - from: ..
    to: game
    filter:
      - server.js
      - package.json
      - public/**
      - shared/**
      - levels/**
  # node_modules must be its own entry — electron-builder strips node_modules
  # from filtered extraResources globs otherwise.
  - from: ../node_modules
    to: game/node_modules
    filter:
      - "**/*"
  # Standalone Node runtime for the SDL controller sidecar (staged per-platform
  # by scripts/prepare-runtime.js before the build). Lands at Resources/runtime/.
  - from: runtime
    to: runtime
    filter:
      - node
      - node.exe

mac:
  category: public.app-category.games
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true            # via App Store Connect API key env (set in CI)

win:
  target:
    - nsis
  icon: build/icon.ico
  # signing done post-build via Azure Trusted Signing in the workflow

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}

linux:
  target:
    - AppImage
  icon: assets/icon.png
  category: Game

# clean, predictable artifact names
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# Where `--publish` sends builds (the desktop package.json has no repository
# field and electron-builder can't infer it from the monorepo's .git/config).
publish:
  provider: github
  owner: monoplay-xyz
  repo: holdout
